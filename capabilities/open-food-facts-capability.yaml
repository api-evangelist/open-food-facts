      inputParameters:
      - name: tagtype
        type: string
        description: tagtype
        required: true
      - name: tags
        type: string
        description: Comma-separated taxonomy tag identifiers.
      - name: fields
        type: string
        description: fields
      outputParameters:
      - type: object
        mapping: $.
    - name: taxonomysuggestions
      description: Taxonomy autocomplete suggestions
