naftiko: 1.0.0-alpha2
info:
  label: Open Food Facts API
  description: 'Open Food Facts API. 7 operations. Lead operation: Get a product by barcode. Self-contained Naftiko capability
    covering one Open Food Facts business surface.'
  tags:
  - Open Food Facts
  - Open Food Facts API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPEN_FOOD_FACTS_API_KEY: OPEN_FOOD_FACTS_API_KEY
capability:
  consumes:
  - type: http
    namespace: open-food-facts
    baseUri: https://world.openfoodfacts.org
    description: Open Food Facts API business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-product-barcode
      path: /api/v2/product/{barcode}
      operations:
      - name: getproductbybarcode
        method: GET
        description: Get a product by barcode
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: barcode
          in: path
          type: string
          description: Product barcode such as an EAN-13.
          required: true
        - name: fields
          in: query
          type: string
          description: Comma-separated list of fields to return.
        - name: lc
          in: query
          type: string
          description: Language code for localized fields (e.g., en, fr).
    - name: api-v2-product-barcode}.json
      path: /api/v2/product/{barcode}.json
      operations:
      - name: getproductbybarcodejson
        method: GET
        description: Get a product by barcode (JSON)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: barcode
          in: path
          type: string
          required: true
        - name: fields
          in: query
          type: string
        - name: blame
          in: query
          type: integer
          description: When 1, include modification history.
    - name: api-v2-search
      path: /api/v2/search
      operations:
      - name: searchproducts
        method: GET
        description: Search products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: code
          in: query
          type: string
          description: Comma-separated list of barcodes for bulk lookup.
        - name: categories_tags_en
          in: query
          type: string
        - name: brands_tags
          in: query
          type: string
        - name: labels_tags
          in: query
          type: string
        - name: countries_tags_en
          in: query
          type: string
        - name: nutrition_grades_tags
          in: query
          type: string
        - name: fields
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: page_size
          in: query
          type: integer
        - name: sort_by
          in: query
          type: string
    - name: api-v2-taxonomy
      path: /api/v2/taxonomy
      operations:
      - name: gettaxonomy
        method: GET
        description: Retrieve taxonomy entries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tagtype
          in: query
          type: string
          required: true
        - name: tags
          in: query
          type: string
          description: Comma-separated taxonomy tag identifiers.
        - name: fields
          in: query
          type: string
    - name: api-v3-product-barcode
      path: /api/v3/product/{barcode}
      operations:
      - name: getproductv3
        method: GET
        description: Get a product (v3)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: barcode
          in: path
          type: string
          required: true
        - name: fields
          in: query
          type: string
    - name: api-v3-taxonomy_suggestions
      path: /api/v3/taxonomy_suggestions
      operations:
      - name: taxonomysuggestions
        method: GET
        description: Taxonomy autocomplete suggestions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tagtype
          in: query
          type: string
          required: true
        - name: string
          in: query
          type: string
          description: Prefix to match.
        - name: lc
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    - name: cgi-suggest.pl
      path: /cgi/suggest.pl
      operations:
      - name: legacysuggest
        method: GET
        description: Legacy suggestion endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tagtype
          in: query
          type: string
          required: true
        - name: term
          in: query
          type: string
  exposes:
  - type: rest
    namespace: open-food-facts-rest
    port: 8080
    description: REST adapter for Open Food Facts API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v2/product/{barcode}
      name: api-v2-product-barcode
      description: REST surface for api-v2-product-barcode.
      operations:
      - method: GET
        name: getproductbybarcode
        description: Get a product by barcode
        call: open-food-facts.getproductbybarcode
        with:
          barcode: rest.barcode
          fields: rest.fields
          lc: rest.lc
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/product/barcode-json
      name: api-v2-product-barcode-json
      description: REST surface for api-v2-product-barcode}.json.
      operations:
      - method: GET
        name: getproductbybarcodejson
        description: Get a product by barcode (JSON)
        call: open-food-facts.getproductbybarcodejson
        with:
          barcode: rest.barcode
          fields: rest.fields
          blame: rest.blame
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/search
      name: api-v2-search
      description: REST surface for api-v2-search.
      operations:
      - method: GET
        name: searchproducts
        description: Search products
        call: open-food-facts.searchproducts
        with:
          code: rest.code
          categories_tags_en: rest.categories_tags_en
          brands_tags: rest.brands_tags
          labels_tags: rest.labels_tags
          countries_tags_en: rest.countries_tags_en
          nutrition_grades_tags: rest.nutrition_grades_tags
          fields: rest.fields
          page: rest.page
          page_size: rest.page_size
          sort_by: rest.sort_by
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/taxonomy
      name: api-v2-taxonomy
      description: REST surface for api-v2-taxonomy.
      operations:
      - method: GET
        name: gettaxonomy
        description: Retrieve taxonomy entries
        call: open-food-facts.gettaxonomy
        with:
          tagtype: rest.tagtype
          tags: rest.tags
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v3/product/{barcode}
      name: api-v3-product-barcode
      description: REST surface for api-v3-product-barcode.
      operations:
      - method: GET
        name: getproductv3
        description: Get a product (v3)
        call: open-food-facts.getproductv3
        with:
          barcode: rest.barcode
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v3/taxonomy-suggestions
      name: api-v3-taxonomy-suggestions
      description: REST surface for api-v3-taxonomy_suggestions.
      operations:
      - method: GET
        name: taxonomysuggestions
        description: Taxonomy autocomplete suggestions
        call: open-food-facts.taxonomysuggestions
        with:
          tagtype: rest.tagtype
          string: rest.string
          lc: rest.lc
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cgi/suggest-pl
      name: cgi-suggest-pl
      description: REST surface for cgi-suggest.pl.
      operations:
      - method: GET
        name: legacysuggest
        description: Legacy suggestion endpoint
        call: open-food-facts.legacysuggest
        with:
          tagtype: rest.tagtype
          term: rest.term
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: open-food-facts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Open Food Facts API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-product-barcode
      description: Get a product by barcode
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-food-facts.getproductbybarcode
      with:
        barcode: tools.barcode
        fields: tools.fields
        lc: tools.lc
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product-barcode-json
      description: Get a product by barcode (JSON)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-food-facts.getproductbybarcodejson
      with:
        barcode: tools.barcode
        fields: tools.fields
        blame: tools.blame
      outputParameters:
      - type: object
        mapping: $.
    - name: search-products
      description: Search products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-food-facts.searchproducts
      with:
        code: tools.code
        categories_tags_en: tools.categories_tags_en
        brands_tags: tools.brands_tags
        labels_tags: tools.labels_tags
        countries_tags_en: tools.countries_tags_en
        nutrition_grades_tags: tools.nutrition_grades_tags
        fields: tools.fields
        page: tools.page
        page_size: tools.page_size
        sort_by: tools.sort_by
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-taxonomy-entries
      description: Retrieve taxonomy entries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-food-facts.gettaxonomy
      with:
        tagtype: tools.tagtype
        tags: tools.tags
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product-v3
      description: Get a product (v3)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-food-facts.getproductv3
      with:
        barcode: tools.barcode
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: taxonomy-autocomplete-suggestions
      description: Taxonomy autocomplete suggestions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-food-facts.taxonomysuggestions
      with:
        tagtype: tools.tagtype
        string: tools.string
        lc: tools.lc
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: legacy-suggestion-endpoint
      description: Legacy suggestion endpoint
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: open-food-facts.legacysuggest
      with:
        tagtype: tools.tagtype
        term: tools.term
      outputParameters:
      - type: object
        mapping: $.
